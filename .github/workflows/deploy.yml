name: 🚀 LINKFORGE PRO — GitHub Pages Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# GitHub Pages 배포를 위한 권한
permissions:
  contents: write

jobs:
  # ── 프론트엔드 빌드 & GitHub Pages 배포 ──────────────────────────────────
  deploy-frontend:
    name: 🏗️ Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build (GitHub Pages 경로 설정)
        working-directory: frontend
        run: npm run build
        env:
          # GitHub Pages는 https://habaikal.github.io/linkforge/ 경로에서 서빙
          VITE_BASE_PATH: "/linkforge/"
          # AI 기능: 로컬 백엔드 실행 시에만 동작 (GitHub Pages는 정적만 지원)
          VITE_API_BASE_URL: ""

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          enable_jekyll: false

  # ── 백엔드 문법 검증 ──────────────────────────────────────────────────────
  verify-backend:
    name: 🖥️ Backend Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Syntax check
        working-directory: backend
        run: node --check server.js
